services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: squash
      POSTGRES_USER: squash
      POSTGRES_PASSWORD: squash
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U squash -d squash']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "until mc alias set local http://minio:9000 minio miniosecret; do sleep 1; done;
      mc mb --ignore-existing local/squash-media"

volumes:
  postgres-data:
  minio-data:
